<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐 - 给爸爸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background-color: #f5efe6;
            background-image: radial-gradient(ellipse at 50% 50%, #fdfaf5 0%, #f5efe6 60%, #ede3d3 100%);
            font-family: 'KaiTi', 'STKaiti', '华文楷体', 'Noto Serif SC', serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            padding: 20px;
        }

        /* ==================== 蛋糕特效 ==================== */
        .cake-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; pointer-events: none; z-index: 9999; 
            will-change: transform; display: none;
        }
        .cake-bg.active { display: block; }
        .cake-bg span {
            position: absolute; display: block; width: 40px; height: 40px; top: -50px; 
            background-size: contain; background-position: center; background-repeat: no-repeat;
            background-color: transparent;
            animation: cakeFall 10s linear infinite;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15)); 
        }
        .cake-bg span:nth-child(1) { left: 10%; width: 30px; height: 30px; background-image: url('cake1.png'); animation-delay: 0s; animation-duration: 12s; }
        .cake-bg span:nth-child(2) { left: 25%; width: 50px; height: 50px; background-image: url('cake2.png'); animation-delay: 2s; animation-duration: 9s; }
        .cake-bg span:nth-child(3) { left: 40%; width: 40px; height: 40px; background-image: url('cake3.png'); animation-delay: 4s; animation-duration: 14s; }
        .cake-bg span:nth-child(4) { left: 60%; width: 55px; height: 55px; background-image: url('cake4.png'); animation-delay: 1s; animation-duration: 10s; }
        .cake-bg span:nth-child(5) { left: 75%; width: 35px; height: 35px; background-image: url('cake1.png'); animation-delay: 3s; animation-duration: 13s; }
        .cake-bg span:nth-child(6) { left: 90%; width: 45px; height: 45px; background-image: url('cake2.png'); animation-delay: 5s; animation-duration: 11s; }
        .cake-bg span:nth-child(7) { left: 5%; width: 50px; height: 50px; background-image: url('cake3.png'); animation-delay: 7s; animation-duration: 15s; }
        .cake-bg span:nth-child(8) { left: 50%; width: 30px; height: 30px; background-image: url('cake4.png'); animation-delay: 6s; animation-duration: 8s; }
        @keyframes cakeFall {
            0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0.2; }
            100% { transform: translateY(115vh) rotate(720deg) scale(1.2); opacity: 1; }
        }

        .scene {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; padding: 20px 10px; min-height: 100vh;
            position: relative; z-index: 1;
        }

        /* ==================== 替换为新生成的信封图片 ==================== */
        .envelope-wrapper {
            position: relative; width: 380px; max-width: 90vw; height: 260px;
            background-image: url('envelope-closed.png');
            background-size: contain; background-position: center; background-repeat: no-repeat;
            cursor: pointer; transition: opacity 0.5s ease, transform 0.5s ease;
            animation: gentleFloat 4s ease-in-out infinite;
        }
        @keyframes gentleFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .envelope-wrapper:hover { animation-play-state: paused; }
        .envelope-wrapper.envelope-hidden { display: none !important; }

        /* ==================== 新版翻页贺卡结构 ==================== */
        .card-wrapper { display: none; width: 380px; max-width: 90vw; flex-direction: column; align-items: center; }
        .card-wrapper.visible { display: flex; animation: cardAppear 0.5s ease-out forwards; }
        @keyframes cardAppear { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        .card {
            background: #fefcf8; border: 10px solid transparent;
            border-image: repeating-linear-gradient(45deg, #c9a468, #c9a468 10px, transparent 10px, transparent 12px) 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12); border-radius: 12px;
            width: 100%; display: flex; flex-direction: column; position: relative;
        }

        /* 【1. 固定的页眉】 */
        .card-header {
            padding: 28px 20px 0; text-align: center;
            position: relative; z-index: 2; flex-shrink: 0;
        }
        .card-header .title { font-size: 2.2rem; color: #c0392b; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 4px; }
        .card-header .subtitle { font-size: 0.9rem; color: #b8862d; letter-spacing: 0.1em; margin-bottom: 16px; }

        /* 【2. 可翻页的正文（使用信纸图片作为底图）】 */
        .card-body {
            flex: 1; position: relative; min-height: 220px; padding: 0; overflow: hidden;
        }
        /* 用生成的横线信纸图片作为背景 */
        .paper-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('paper-bg.png');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            pointer-events: none; z-index: 1;
        }
        
        .card-content {
            position: relative; z-index: 2; height: 100%;
            padding: 10px 20px 12px;
            cursor: pointer;
            display: flex; flex-direction: column; justify-content: center;
        }
        .page {
            display: none; flex-direction: column; justify-content: center;
            width: 100%;
            animation: pageFadeIn 0.6s ease-out forwards;
        }
        .page.active { display: flex; }
        @keyframes pageFadeIn { 0% { opacity: 0; transform: translateX(8px); } 100% { opacity: 1; transform: translateX(0); } }

        /* 关怀版大字与手写体 */
        .text-line {
            font-size: 1.2rem; line-height: 2.2; color: #3a2f28; 
            font-family: 'KaiTi', 'STKaiti', serif; margin-bottom: 4px; opacity: 0;
            position: relative; letter-spacing: 0.06em; text-align: left;
        }
        
        /* 【3. 固定的页脚】 */
        .card-footer {
            flex-shrink: 0; padding: 0 12px 18px; margin-top: 8px;
            position: relative; z-index: 2;
        }
        .divider { width: 55%; margin: 0 auto 10px; height: 1px; background: linear-gradient(90deg, transparent, rgba(180,140,100,0.45), transparent); position: relative; }
        .divider::after { content: '♪'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fefcf8; padding: 0 14px; color: #b8862d; font-size: 0.8rem; }

        .audio-bar { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .audio-img-btn { width: 36px; height: 36px; object-fit: contain; cursor: pointer; transition: transform 0.2s ease; }
        .audio-img-btn:active { transform: scale(0.9); }
        .progress-track { width: 60px; height: 3px; background: rgba(180,150,120,0.2); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #c0392b; width: 0%; transition: width 0.3s linear; }

        /* 底部提示 */
        .hint { margin-top: 20px; font-size: 0.8rem; color: rgba(140,110,80,0.55); letter-spacing: 0.06em; animation: hintPulse 2.2s infinite ease-in-out; }
        @keyframes hintPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; } }
        .hint.hidden { visibility: hidden; }

        @media (max-width: 500px) {
            body { padding: 10px; }
            .envelope-wrapper { width: 90vw; height: 220px; }
            .card-wrapper { width: 95vw; }
            .card-header { padding-top: 20px; }
            .card-header .title { font-size: 1.8rem; }
            .card-content { padding: 0 16px 6px; min-height: 200px; }
            .text-line { font-size: 1rem; line-height: 2; }
            .audio-bar { margin-bottom: 0; }
            .audio-img-btn { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>
    <div class="cake-bg" id="cakeBg">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <div class="scene">
        <!-- 替换为新生成的信封 -->
        <div class="envelope-wrapper" id="envelopeWrapper">
            <!-- 信封图片直接由 background-image 控制 -->
        </div>

        <div class="card-wrapper" id="cardWrapper">
            <div class="card">
                
                <!-- 固定页眉区 -->
                <div class="card-header">
                    <div class="title">生 日 快 乐</div>
                    <div class="subtitle">—— 致我最敬爱的爸爸 ——</div>
                </div>

                <!-- 可翻页正文区 (带信纸底图) -->
                <div class="card-body">
                    <div class="paper-bg"></div>
                    <div class="card-content" id="cardContent">
                        <!-- 第1页 -->
                        <div class="page active" data-index="0">
                            <div class="text-line" data-text="亲爱的爸爸，"></div>
                            <div class="text-line" data-text="今天是您的生日。"></div>
                            <div class="text-line" data-text="我想对您说一声："></div>
                            <div class="text-line" data-text="辛苦了，谢谢您！"></div>
                        </div>
                        <!-- 第2页 -->
                        <div class="page" data-index="1">
                            <div class="text-line" data-text="感谢您多年来的养育与呵护。"></div>
                            <div class="text-line" data-text="您的每一滴汗水、每一根白发，"></div>
                            <div class="text-line" data-text="都是为我撑起一片天的印记。"></div>
                        </div>
                        <!-- 第3页 -->
                        <div class="page" data-index="2">
                            <div class="text-line" data-text="愿时光慢一些。"></div>
                            <div class="text-line" data-text="愿您身体健康、笑容常在。"></div>
                            <div class="text-line" data-text="愿幸福与温暖常伴您左右。"></div>
                        </div>
                        <!-- 第4页 -->
                        <div class="page" data-index="3">
                            <div class="text-line" data-text="无论我走到哪里，"></div>
                            <div class="text-line" data-text="您永远是我心中最坚实的依靠。"></div>
                            <div class="text-line" style="margin-top: 20px; text-align: right; opacity: 1; color: #c0392b; font-size: 1.1rem;">
                                —— 永远爱您的孩子
                            </div>
                            <div style="text-align: center; margin-top: 10px; color: rgba(140,110,80,0.4); font-size: 0.8rem; font-family: sans-serif;" id="pageHint">🎉 点击此处重阅</div>
                        </div>
                    </div>
                </div>

                <!-- 固定页脚区 -->
                <div class="card-footer">
                    <div class="divider"></div>
                    <div class="audio-bar">
                        <img src="play-btn.png" id="audioBtn" class="audio-img-btn" title="播放/暂停背景音乐">
                        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
                    </div>
                </div>

            </div>
        </div>

        <div class="hint" id="hintText">点击信封打开贺卡</div>
    </div>

    <audio id="bgAudio" preload="auto" loop src="father-song.mp3"></audio>

    <script>
        (function() {
            const cakeBg = document.getElementById('cakeBg');
            const envelopeWrapper = document.getElementById('envelopeWrapper');
            const cardWrapper = document.getElementById('cardWrapper');
            const cardContent = document.getElementById('cardContent');
            const hintText = document.getElementById('hintText');
            const bgAudio = document.getElementById('bgAudio');
            const audioBtn = document.getElementById('audioBtn');
            const progressFill = document.getElementById('progressFill');
            const pageHint = document.getElementById('pageHint');

            let currentPageIndex = 0;
            let isTyping = false;
            let typeTimer = null;
            let isOpen = false, isAnimating = false, isAudioReady = false;
            let musicTriggered = false;

            bgAudio.load();
            bgAudio.addEventListener('loadeddata', () => { isAudioReady = true; });
            bgAudio.addEventListener('canplaythrough', () => { isAudioReady = true; });

            // ========== 打字动画函数 ==========
            function typeWriter(element, text, index = 0, callback) {
                if (index < text.length) {
                    element.textContent += text[index];
                    let delay = Math.random() * 60 + 40; 
                    typeTimer = setTimeout(() => typeWriter(element, text, index + 1, callback), delay);
                } else {
                    element.style.opacity = '1';
                    if (callback) callback();
                }
            }

            function triggerPageAnimation(pageElement) {
                const lines = pageElement.querySelectorAll('.text-line[data-text]');
                lines.forEach((line, index) => {
                    line.textContent = '';
                    line.style.opacity = '0';
                    setTimeout(() => {
                        typeWriter(line, line.dataset.text, 0, () => {
                            if(index === lines.length - 1) {
                                isTyping = false;
                            }
                        });
                    }, index * 400 + 200);
                });
            }

            function changePage() {
                if (isTyping) return;

                const currentPage = document.querySelector(`.page[data-index="${currentPageIndex}"]`);
                const nextPage = document.querySelector(`.page[data-index="${currentPageIndex + 1}"]`);

                // 如果是最后一页（data-index="3"），点击则重置翻页
                if (currentPageIndex === 3) {
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    const firstPage = document.querySelector(`.page[data-index="0"]`);
                    firstPage.classList.add('active');
                    currentPageIndex = 0;
                    isTyping = true;
                    triggerPageAnimation(firstPage);
                    pageHint.textContent = '🎉 点击此处重阅';
                    return;
                }

                if (currentPage) currentPage.classList.remove('active');
                if (nextPage) {
                    nextPage.classList.add('active');
                    isTyping = true;
                    triggerPageAnimation(nextPage);
                    currentPageIndex++;
                }
            }

            // ========== 打开信封 ==========
            function openEnvelope() {
                if (isAnimating || isOpen) return;
                isAnimating = true; isOpen = true;
                
                // 第一步：将信封图片替换为打开的状态
                envelopeWrapper.style.backgroundImage = "url('envelope-open.png')";
                // 去掉飘浮动画
                envelopeWrapper.style.animation = 'none';

                tryPlayMusic();
                
                // 第二步：0.7秒后隐藏信封，显示贺卡
                setTimeout(() => {
                    envelopeWrapper.style.display = 'none'; 
                    cardWrapper.classList.add('visible');
                    hintText.classList.add('hidden');
                    // 启动首页打字动画
                    const firstPage = document.querySelector(`.page[data-index="0"]`);
                    isTyping = true;
                    triggerPageAnimation(firstPage);
                    // 启动蛋糕掉落
                    cakeBg.classList.add('active');
                    isAnimating = false;
                }, 700);
            }

            function closeCard() {
                if (isAnimating || !isOpen) return;
                isAnimating = true; isOpen = false; musicTriggered = false;
                bgAudio.pause(); updateAudioBtn(false);
                cardWrapper.classList.remove('visible');
                envelopeWrapper.style.display = ''; 
                envelopeWrapper.style.backgroundImage = "url('envelope-closed.png')";
                envelopeWrapper.style.animation = 'gentleFloat 4s ease-in-out infinite';
                hintText.classList.remove('hidden');
                cakeBg.classList.remove('active');
                // 重置翻页状态
                currentPageIndex = 0;
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelector(`.page[data-index="0"]`).classList.add('active');
                document.querySelectorAll('.text-line[data-text]').forEach(l => { l.textContent = ''; l.style.opacity = '0'; });
                pageHint.textContent = '🎉 点击此处重阅';
                setTimeout(() => { isAnimating = false; }, 500);
            }

            function tryPlayMusic() {
                if (musicTriggered || !bgAudio.src) return;
                const playPromise = bgAudio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => { musicTriggered = true; updateAudioBtn(true); }).catch(() => {});
                }
            }

            function updateAudioBtn(playing) {
                audioBtn.src = playing ? 'pause-btn.png' : 'play-btn.png';
            }

            function toggleAudio() {
                if (!isAudioReady || !bgAudio.src) return;
                if (bgAudio.paused) {
                    bgAudio.play().then(() => { updateAudioBtn(true); musicTriggered = true; }).catch(() => {});
                } else {
                    bgAudio.pause(); updateAudioBtn(false);
                }
            }

            // ========== 事件绑定 ==========
            envelopeWrapper.addEventListener('click', (e) => { if (!isOpen && !isAnimating) openEnvelope(); });
            cardContent.addEventListener('click', (e) => { if (isOpen && !isAnimating) changePage(); });
            cardWrapper.addEventListener('dblclick', (e) => { if (isOpen && !isAnimating) closeCard(); });
            audioBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleAudio(); });

            bgAudio.addEventListener('timeupdate', () => {
                if (bgAudio.duration && isFinite(bgAudio.duration)) {
                    progressFill.style.width = Math.min(100, (bgAudio.currentTime / bgAudio.duration) * 100) + '%';
                }
            });
            bgAudio.addEventListener('play', () => updateAudioBtn(true));
            bgAudio.addEventListener('pause', () => updateAudioBtn(false));
            bgAudio.addEventListener('ended', () => { updateAudioBtn(false); progressFill.style.width = '100%'; });

            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); 
                    if (!isOpen && !isAnimating) openEnvelope(); 
                    else if (isOpen && !isAnimating) changePage(); 
                    else toggleAudio(); 
                }
                if (e.key === 'Escape' || e.code === 'Escape') { if (isOpen && !isAnimating) closeCard(); }
            });
        })();
    </script>
</body>
</html>
