<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐 - 给爸爸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background-color: #f5efe6;
            font-family: 'KaiTi', 'STKaiti', '华文楷体', 'Noto Serif SC', serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            padding: 20px;
        }

        /* ==================== 轻量蛋糕掉落特效 ==================== */
        .cake-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; pointer-events: none; z-index: 9999; 
            display: none;
        }
        .cake-bg.active { display: block; }
        .cake-bg span {
            position: absolute; display: block; width: 30px; height: 30px; top: -50px; 
            background-size: contain; background-position: center; background-repeat: no-repeat;
            animation: cakeFall 10s linear infinite;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.1)); 
        }
        .cake-bg span:nth-child(1) { left: 10%; width: 25px; height: 25px; background-image: url('cake1.png'); animation-delay: 0s; animation-duration: 12s; }
        .cake-bg span:nth-child(2) { left: 25%; width: 40px; height: 40px; background-image: url('cake2.png'); animation-delay: 2s; animation-duration: 9s; }
        .cake-bg span:nth-child(3) { left: 40%; width: 35px; height: 35px; background-image: url('cake3.png'); animation-delay: 4s; animation-duration: 14s; }
        .cake-bg span:nth-child(4) { left: 60%; width: 45px; height: 45px; background-image: url('cake4.png'); animation-delay: 1s; animation-duration: 10s; }
        .cake-bg span:nth-child(5) { left: 75%; width: 30px; height: 30px; background-image: url('cake1.png'); animation-delay: 3s; animation-duration: 13s; }
        .cake-bg span:nth-child(6) { left: 90%; width: 40px; height: 40px; background-image: url('cake2.png'); animation-delay: 5s; animation-duration: 11s; }
        .cake-bg span:nth-child(7) { left: 5%; width: 45px; height: 45px; background-image: url('cake3.png'); animation-delay: 7s; animation-duration: 15s; }
        .cake-bg span:nth-child(8) { left: 50%; width: 25px; height: 25px; background-image: url('cake4.png'); animation-delay: 6s; animation-duration: 8s; }
        @keyframes cakeFall {
            0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0.2; }
            100% { transform: translateY(110vh) rotate(720deg) scale(1.2); opacity: 1; }
        }

        .scene {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; padding: 20px 10px; min-height: 100vh;
            position: relative; z-index: 1;
        }

        /* ==================== 纯CSS信封 ==================== */
        .envelope-wrapper {
            position: relative; width: 320px; max-width: 85vw; height: 220px;
            cursor: pointer; transition: opacity 0.5s ease;
            animation: gentleFloat 4s ease-in-out infinite;
        }
        @keyframes gentleFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .envelope-wrapper.envelope-hidden { display: none !important; }

        .env-body {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 70%;
            background: linear-gradient(135deg, #ebd6b0 0%, #dab88b 100%);
            border-radius: 6px; box-shadow: 0 8px 28px rgba(0,0,0,0.14); z-index: 3;
            display: flex; align-items: center; justify-content: center;
        }
        .env-body::after {
            content: '致·亲爱的爸爸'; color: #5a3f28; font-size: 1.4rem;
            font-weight: bold; letter-spacing: 0.08em; opacity: 0.9;
        }

        .env-flap {
            position: absolute; top: 0; left: 0; width: 100%; height: 48%;
            background: linear-gradient(180deg, #f3e6d2 0%, #e8d5b5 15%, #dfcaa6 40%, #d9c29d 65%, #dcc7a4 100%);
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            z-index: 6; transform-origin: top center;
            transition: transform 0.65s cubic-bezier(0.25, 0.1, 0.1, 1);
            backface-visibility: hidden;
        }
        .env-flap::after {
            content: '生日快乐'; position: absolute; top: 10px; right: 10px;
            border: 1.5px dashed #c0392b; padding: 2px 5px; font-size: 0.6rem; 
            color: #c0392b; background: #fcf6e7; border-radius: 2px; transform: rotate(8deg);
        }
        .envelope-wrapper.flap-open .env-flap { transform: rotateX(-180deg); opacity: 0; }

        .env-seal {
            position: absolute; top: 56%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px;
            background: radial-gradient(ellipse at 35% 30%, #e74c3c 0%, #c0392b 40%, #8b1a1a 100%);
            border-radius: 50%; z-index: 7; pointer-events: none;
            box-shadow: 0 3px 8px rgba(0,0,0,0.28); transition: all 0.5s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .env-seal::before { content: '♥'; font-size: 0.8rem; color: rgba(255,255,255,0.7); }
        .envelope-wrapper.flap-open .env-seal { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }

        /* ==================== 白卡片设计 ==================== */
        .card-wrapper { display: none; width: 340px; max-width: 95vw; }
        .card-wrapper.visible { display: flex; animation: cardAppear 0.5s ease-out forwards; }
        @keyframes cardAppear { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        .card {
            background: #fefcfb;
            border: 1px solid rgba(220, 200, 180, 0.3);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            width: 100%; display: flex; flex-direction: column; position: relative;
            padding: 24px 16px 18px;
        }

        /* === 贺卡顶部区域（充分利用留白） === */
        .card-header { text-align: center; padding-bottom: 16px; }
        .header-wish {
            font-size: 1.1rem; color: #a64e3b; margin-bottom: 10px; letter-spacing: 0.06em;
        }
        .card-header .title { font-size: 2.2rem; color: #c0392b; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 4px; }
        .card-header .subtitle { font-size: 0.85rem; color: #b8862d; letter-spacing: 0.1em; }

        /* === 贺卡内容区 === */
        .card-content { position: relative; min-height: 220px; cursor: pointer; }
        .page { display: none; width: 100%; animation: pageFadeIn 0.4s ease-out forwards; }
        .page.active { display: flex; flex-direction: column; gap: 4px; }
        @keyframes pageFadeIn { 0% { opacity: 0; transform: translateX(8px); } 100% { opacity: 1; transform: translateX(0); } }

        .text-line {
            font-size: 1.3rem; line-height: 2.2; color: #3a2f28; 
            font-family: 'KaiTi', 'STKaiti', serif; opacity: 0;
            letter-spacing: 0.06em; text-align: left;
            display: inline-block;
            border-bottom: 1px solid rgba(180, 150, 120, 0.2);
            padding-bottom: 2px;
            width: 100%;
        }
        
        /* 署名 */
        .text-line.sign {
            border-bottom: none; text-align: right; color: #c0392b; font-size: 1.1rem; 
            padding-top: 12px; letter-spacing: 0.08em;
        }
        .text-line.hint-tip {
            border-bottom: none; text-align: center; color: rgba(140,110,80,0.45); font-size: 0.8rem; padding-top: 10px;
        }

        /* === 底部图片按钮 === */
        .card-footer { text-align: center; padding-top: 12px; display: flex; justify-content: center; }
        .audio-bar { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .audio-img-btn {
            width: 36px; height: 36px; object-fit: contain; cursor: pointer;
            transition: transform 0.2s ease;
        }
        .audio-img-btn:active { transform: scale(0.9); }
        .progress-track { width: 60px; height: 3px; background: rgba(180,150,120,0.2); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #c0392b; width: 0%; transition: width 0.3s linear; }

        .hint { margin-top: 20px; font-size: 0.8rem; color: rgba(140,110,80,0.55); letter-spacing: 0.06em; animation: hintPulse 2.2s infinite ease-in-out; }
        @keyframes hintPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; } }
        .hint.hidden { visibility: hidden; }

        @media (max-width: 500px) {
            .envelope-wrapper { width: 88vw; height: 200px; }
            .card { padding: 18px 12px 14px; }
            .header-wish { font-size: 1rem; }
            .card-header .title { font-size: 1.8rem; }
            .card-content { min-height: 180px; }
            .text-line { font-size: 1.1rem; line-height: 2; }
            .env-body::after { font-size: 1.1rem; }
            .env-flap::after { font-size: 0.55rem; padding: 2px 4px; }
        }
    </style>
</head>
<body>
    <div class="cake-bg" id="cakeBg">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <div class="scene">
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="env-body"></div>
            <div class="env-flap" id="envFlap"></div>
            <div class="env-seal" id="envSeal"></div>
        </div>

        <div class="card-wrapper" id="cardWrapper">
            <div class="card">
                <div class="card-header">
                    <div class="header-wish">���� 亲爱的爸爸，儿女祝您生日快乐 ����</div>
                    <div class="title">生 日 快 乐</div>
                    <div class="subtitle">—— 致我最敬爱的爸爸 ——</div>
                </div>

                <!-- 翻页内容区 -->
                <div class="card-content" id="cardContent">
                    <div class="page active">
                        <div class="text-line" data-text="亲爱的爸爸，"> </div>
                        <div class="text-line" data-text="今天是您的生日。"> </div>
                        <div class="text-line" data-text="我想对您说一声："> </div>
                        <div class="text-line" data-text="辛苦了，谢谢您！"> </div>
                    </div>
                    <div class="page">
                        <div class="text-line" data-text="感谢您多年来的养育与呵护。"> </div>
                        <div class="text-line" data-text="您的每一滴汗水，"> </div>
                        <div class="text-line" data-text="都是为我撑起一片天的印记。"> </div>
                    </div>
                    <div class="page">
                        <div class="text-line" data-text="愿时光慢一些。"> </div>
                        <div class="text-line" data-text="愿您身体健康、笑容常在。"> </div>
                        <div class="text-line" data-text="愿幸福与温暖常伴您左右。"> </div>
                    </div>
                    <!-- 第4页：署名特意去掉了打字动画，保证不缺失！ -->
                    <div class="page">
                        <div class="text-line" data-text="无论我走到哪里，"> </div>
                        <div class="text-line" data-text="您永远是我心中最坚实的依靠。"> </div>
                        <!-- 这段不用打字动画，直接展示 -->
                        <div class="text-line sign">—— 永远爱您的孩子</div>
                        <div class="text-line hint-tip">���� 点击此处重新翻阅</div>
                    </div>
                </div>

                <div class="card-footer">
                    <div class="audio-bar">
                        <!-- 图片按钮 -->
                        <img src="play-btn.png" id="audioBtn" class="audio-img-btn" title="播放/暂停背景音乐">
                        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="hint" id="hintText">点击信封打开贺卡</div>
    </div>

    <audio id="bgAudio" preload="auto" loop src="father-song.mp3"></audio>

    <script>
        (function() {
            const cakeBg = document.getElementById('cakeBg');
            const envelopeWrapper = document.getElementById('envelopeWrapper');
            const cardWrapper = document.getElementById('cardWrapper');
            const cardContent = document.getElementById('cardContent');
            const hintText = document.getElementById('hintText');
            const bgAudio = document.getElementById('bgAudio');
            const audioBtn = document.getElementById('audioBtn');
            const progressFill = document.getElementById('progressFill');

            let currentPageIndex = 0;
            let isTyping = false;
            let isOpen = false, isAnimating = false;

            // 打字动画逻辑
            function typeWriter(element, text, index = 0, callback) {
                if (index < text.length) {
                    element.textContent += text[index];
                    let delay = Math.random() * 50 + 30; 
                    setTimeout(() => typeWriter(element, text, index + 1, callback), delay);
                } else {
                    element.style.opacity = '1';
                    if (callback) callback();
                }
            }

            function triggerPageAnimation(pageElement) {
                // 只对有 data-text 属性的行进行动画，署名直接跳过
                const lines = pageElement.querySelectorAll('.text-line[data-text]');
                lines.forEach((line, index) => {
                    line.textContent = '';
                    line.style.opacity = '0';
                    setTimeout(() => {
                        typeWriter(line, line.dataset.text, 0, () => {
                            if(index === lines.length - 1) isTyping = false;
                        });
                    }, index * 300 + 100);
                });
            }

            function changePage() {
                if (isTyping) return;
                const currentPage = document.querySelector(`.page:nth-child(${currentPageIndex + 1})`);
                const nextPage = document.querySelector(`.page:nth-child(${currentPageIndex + 2})`);

                if (currentPageIndex === 3) {
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.querySelector('.page:first-child').classList.add('active');
                    currentPageIndex = 0;
                    isTyping = true;
                    triggerPageAnimation(document.querySelector('.page:first-child'));
                    return;
                }

                if (currentPage) currentPage.classList.remove('active');
                if (nextPage) {
                    nextPage.classList.add('active');
                    isTyping = true;
                    triggerPageAnimation(nextPage);
                    currentPageIndex++;
                }
            }

            function openEnvelope() {
                if (isAnimating || isOpen) return;
                isAnimating = true; isOpen = true;
                envelopeWrapper.classList.add('flap-open');
                tryPlayMusic();
                setTimeout(() => {
                    envelopeWrapper.style.display = 'none'; 
                    cardWrapper.classList.add('visible');
                    hintText.classList.add('hidden');
                    isTyping = true;
                    triggerPageAnimation(document.querySelector('.page:first-child'));
                    cakeBg.classList.add('active');
                    isAnimating = false;
                }, 700);
            }

            function closeCard() {
                if (isAnimating || !isOpen) return;
                isAnimating = true; isOpen = false;
                bgAudio.pause(); updateAudioBtn(false);
                cardWrapper.classList.remove('visible');
                envelopeWrapper.style.display = ''; 
                envelopeWrapper.classList.remove('flap-open');
                hintText.classList.remove('hidden');
                cakeBg.classList.remove('active');
                currentPageIndex = 0;
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelector('.page:first-child').classList.add('active');
                document.querySelectorAll('.text-line[data-text]').forEach(l => { l.textContent = ''; l.style.opacity = '0'; });
                setTimeout(() => { isAnimating = false; }, 500);
            }

            // === 修复：按钮切换逻辑 ===
            function tryPlayMusic() {
                const playPromise = bgAudio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => updateAudioBtn(true)).catch(() => {});
                }
            }
            function updateAudioBtn(playing) {
                // 必须换回 play-btn.png
                audioBtn.src = playing ? 'pause-btn.png' : 'play-btn.png';
            }

            function toggleAudio() {
                if (bgAudio.paused) {
                    bgAudio.play().then(() => updateAudioBtn(true)).catch(() => {});
                } else {
                    bgAudio.pause(); updateAudioBtn(false);
                }
            }

            envelopeWrapper.addEventListener('click', openEnvelope);
            cardContent.addEventListener('click', changePage);
            cardWrapper.addEventListener('dblclick', closeCard);
            audioBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleAudio(); });

            bgAudio.addEventListener('timeupdate', () => {
                if (bgAudio.duration && isFinite(bgAudio.duration)) {
                    progressFill.style.width = Math.min(100, (bgAudio.currentTime / bgAudio.duration) * 100) + '%';
                }
            });
            bgAudio.addEventListener('play', () => updateAudioBtn(true));
            bgAudio.addEventListener('pause', () => updateAudioBtn(false));
            bgAudio.addEventListener('ended', () => { updateAudioBtn(false); progressFill.style.width = '100%'; });

            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); if (!isOpen) openEnvelope(); else changePage(); }
                if (e.key === 'Escape' || e.code === 'Escape') { if (isOpen) closeCard(); }
            });
        })();
    </script>
</body>
</html>
